<!DOCTYPE html>
<html 
lang="{{ site.Language.LanguageCode }}" 
dir="{{ or site.Language.LanguageDirection `ltr` }}" 
data-theme-system="auto">

{{ partial "head/head.html" . }}
<body>
  <aside class="sidebar" id="sidebar">
    {{ partial "sidebar.html" . }}
  </aside>
  <main class="main">
    {{ partial "header.html" . }}
    {{ block "main" . }}{{ end }}
    {{ partial "footer.html" . }}
  </main>
  {{ partial "loading.html" . }}
</body>
</html>
