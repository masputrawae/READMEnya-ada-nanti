<ul class="nav" id="menuAnchor">
  {{ range site.Menus.anchor }}
    <li class="nav__link">
      <a href="{{ .URL | relURL }}" data-anchor="{{ .URL | relURL }}" class="btn btn--icon">
        <i class="bi {{ with .Params.icon }}{{ . }}{{ end }} btn__icon"></i>
        <span class="btn__text">{{ .Name }}</span>
      </a>
    </li>
  {{ end }}
</ul>
